<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>MY WARDROBE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 天気バー -->
  <div class="weather-bar">
    <div class="weather-bar-inner">
      <span id="w-date">—</span>
      <span id="w-icon" style="font-size:16px">⏳</span>
      <span id="w-label"></span>
      <span id="w-temp" class="w-temp"></span>
      <span id="w-season" class="weather-season-badge"></span>
    </div>
  </div>

  <!-- ヘッダー -->
  <header>
    <div class="header-inner">
      <div class="logo">MY <span>Wardrobe</span></div>
      <div class="header-right">
        <div class="header-count" id="header-count">— アイテム</div>
        <a href="coord.html" class="csv-import-btn">👔 コーデ</a>
        <label class="csv-import-btn" title="CSVから一括インポート">
          📥 CSV
          <input type="file" accept=".csv" id="csv-input" onchange="importCSV(event)" />
        </label>
      </div>
    </div>
  </header>

  <!-- 検索バー -->
  <div class="search-bar">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="名前・ブランド・カテゴリ・素材・文化圏などで検索..."
        oninput="onSearch(this.value)"
      />
      <button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none">✕</button>
    </div>
  </div>

  <!-- ソート・フィルター -->
  <div class="toolbar">
    <span class="toolbar-label">Sort</span>
    <button class="chip active" onclick="setSort('wear_count',this)">着用↓</button>
    <button class="chip"        onclick="setSort('like_count', this)">お気に入り↓</button>
    <button class="chip"        onclick="setSort('name',       this)">名前順</button>
    <button class="chip"        onclick="setSort('created_at', this)">追加順</button>
  </div>
  <div class="toolbar" style="padding-top:6px; padding-bottom:12px">
    <span class="toolbar-label">季節</span>
    <button class="chip season active" data-s="all"    onclick="setSeason('all',   this)">すべて</button>
    <button class="chip season"        data-s="spring" onclick="setSeason('spring',this)">🌸 春</button>
    <button class="chip season"        data-s="summer" onclick="setSeason('summer',this)">☀ 夏</button>
    <button class="chip season"        data-s="fall"   onclick="setSeason('fall',  this)">🍂 秋</button>
    <button class="chip season"        data-s="winter" onclick="setSeason('winter',this)">❄ 冬</button>
  </div>

  <!-- ローディング -->
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">読み込み中...</div>
  </div>

  <!-- アイテム一覧 -->
  <div class="grid" id="list" style="display:none"></div>

  <!-- FAB -->
  <button class="fab" onclick="openAddModal()">＋ アイテムを追加</button>

  <!-- 追加・編集モーダル -->
  <div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-title" id="modal-title">New Item</div>

      <div class="field">
        <label>写真（任意）</label>
        <div class="photo-drop" id="modal-photo-area">
          <div id="upload-icon">📷</div>
          <div id="upload-text" class="upload-text">タップして写真を選択</div>
          <input type="file" accept="image/*" id="modal-photo-input" onchange="previewPhoto(event)" />
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>アイテム名 <span class="req">*</span></label>
          <input type="text" id="inp-name" placeholder="例: G-1 Flight Jacket" maxlength="60" />
        </div>
        <div class="field">
          <label>ブランド</label>
          <input type="text" id="inp-brand" placeholder="例: USN" maxlength="40" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>カテゴリ</label>
          <select id="inp-cat">
            <option value="jacket">ジャケット</option>
            <option value="outer">アウター</option>
            <option value="parka">パーカー</option>
            <option value="sweat">スウェット</option>
            <option value="shirt">シャツ</option>
            <option value="knit">ニット</option>
            <option value="vest">ベスト</option>
            <option value="pants">パンツ</option>
            <option value="shoes">シューズ</option>
            <option value="bag">バッグ</option>
            <option value="accessory">アクセサリー</option>
            <option value="other">その他</option>
          </select>
        </div>
        <div class="field">
          <label>カラー</label>
          <input type="text" id="inp-color" placeholder="例: brown" maxlength="30" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>国</label>
          <input type="text" id="inp-country" placeholder="例: us" maxlength="30" />
        </div>
        <div class="field">
          <label>素材</label>
          <input type="text" id="inp-fabric" placeholder="例: cotton" maxlength="40" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>カルチャー</label>
          <input type="text" id="inp-culture" placeholder="例: american casual" maxlength="40" />
        </div>
        <div class="field">
          <label>年代</label>
          <input type="text" id="inp-year" placeholder="例: 90s" maxlength="10" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>お気に入り度（1〜5）</label>
          <input type="number" id="inp-like" min="1" max="5" placeholder="例: 4" />
        </div>
        <div class="field">
          <label>着用回数</label>
          <input type="number" id="inp-count" min="0" placeholder="例: 3" />
        </div>
      </div>

      <div class="field">
        <label>季節（複数選択可）</label>
        <div class="season-check-row">
          <label class="season-check-opt"><input type="checkbox" name="inp-seasons" value="spring"><span>🌸 春</span></label>
          <label class="season-check-opt"><input type="checkbox" name="inp-seasons" value="summer"><span>☀ 夏</span></label>
          <label class="season-check-opt"><input type="checkbox" name="inp-seasons" value="fall"  ><span>🍂 秋</span></label>
          <label class="season-check-opt"><input type="checkbox" name="inp-seasons" value="winter"><span>❄ 冬</span></label>
        </div>
      </div>

      <div class="field">
        <label>写真なしの場合のアイコン</label>
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn-add" id="modal-submit-btn" onclick="submitItem()">追加する</button>
      </div>
    </div>
  </div>

  <!-- CSVインポート確認モーダル -->
  <div class="modal-overlay" id="csv-modal" onclick="handleCsvOverlayClick(event)">
    <div class="modal">
      <div class="modal-title">CSV インポート</div>
      <div id="csv-preview-text" style="font-size:13px;color:var(--text-mid);line-height:1.8;margin-bottom:20px"></div>
      <div class="field">
        <label>重複アイテムの扱い（名前＋ブランドで判定）</label>
        <div class="radio-row">
          <label class="radio-opt"><input type="radio" name="dup" value="skip" checked><span>スキップ</span></label>
          <label class="radio-opt"><input type="radio" name="dup" value="overwrite"><span>上書き</span></label>
          <label class="radio-opt"><input type="radio" name="dup" value="add"><span>追加</span></label>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCsvModal()">キャンセル</button>
        <button class="btn-add" onclick="confirmImport()">インポート実行</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
