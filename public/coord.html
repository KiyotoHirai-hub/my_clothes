<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>コーデ提案 — MY WARDROBE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    /* coord 専用スタイル */
    .coord-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(247,247,245,0.96);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
    }

    .coord-content {
      max-width: 540px;
      margin: 0 auto;
      padding: 20px 20px 40px;
    }

    /* STEP ラベル */
    .step-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 10px;
    }
    .step-label-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .step-label-row .step-label { margin-bottom: 0; }
    .loc-btn-coord {
      font-size: 11px; color: var(--text-muted);
      background: none; border: none; cursor: pointer; padding: 2px 4px;
    }
    .loc-btn-coord:hover { color: var(--text); }

    /* 天気サマリー */
    .weather-summary {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px; font-size: 13px;
    }

    .weather-summary-icon { font-size: 22px; flex-shrink: 0; }
    .weather-summary-main { flex: 1; }
    .weather-summary-temp { font-weight: 700; font-size: 15px; }
    .weather-summary-desc { color: var(--text-muted); font-size: 12px; margin-top: 1px; }

    /* 系統選択 */
    .style-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    .style-card {
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      padding: 14px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .style-card.selected {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .style-card-icon { font-size: 22px; margin-bottom: 6px; }
    .style-card-name { font-size: 13px; font-weight: 600; }
    .style-card-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
    .style-card.selected .style-card-desc { color: rgba(255,255,255,0.7); }

    /* 生成ボタン */
    .generate-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--r);
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 32px;
    }

    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .generate-btn:hover:not(:disabled) { opacity: 0.85; }

    /* 生成中アニメーション */
    .generating-wrap {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }

    .generating-dots {
      display: inline-flex; gap: 6px; margin-bottom: 12px;
    }

    .generating-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .generating-dots span:nth-child(2) { animation-delay: 0.2s; }
    .generating-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    .generating-text { font-size: 13px; color: var(--text-muted); }

    /* コーデ提案カード */
    .coord-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 16px;
      animation: fadeUp 0.3s ease both;
    }

    .coord-card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }

    .coord-theme-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      padding: 3px 8px; border-radius: 3px;
      background: var(--accent); color: #fff;
      text-transform: uppercase; white-space: nowrap;
    }

    .coord-theme-badge.rare   { background: #0b6e99; }
    .coord-theme-badge.color  { background: #0f7b6c; }
    .coord-theme-badge.season { background: #9b6b2e; }
    .coord-theme-badge.style  { background: #6e3dc8; }

    .coord-card-title { font-size: 13px; font-weight: 600; }

    /* アイテム一覧（横スクロール） */
    .coord-items {
      display: flex; gap: 10px;
      padding: 14px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .coord-items::-webkit-scrollbar { display: none; }

    .coord-item {
      flex-shrink: 0;
      width: 90px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .coord-item:active { opacity: 0.7; }

    .coord-item-photo {
      width: 90px; height: 110px;
      background: var(--bg2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
      display: flex; align-items: center; justify-content: center;
    }

    .coord-item-photo img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .coord-item-photo-emoji { font-size: 32px; opacity: 0.6; }

    .coord-item-name {
      font-size: 10px; font-weight: 500;
      color: var(--text); line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .coord-item-brand {
      font-size: 9px; color: var(--text-muted); margin-top: 1px;
    }

    .coord-item-worn {
      font-size: 9px; color: var(--text-muted);
      margin-top: 2px;
    }

    /* コーデの説明文 */
    .coord-description {
      padding: 0 16px 14px;
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.7;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    /* ルール達成状況 */
    .coord-rules {
      padding: 8px 16px 12px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.8;
      border-top: 1px dashed var(--border);
    }

    /* カルーセルナビゲーション */
    .coord-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 8px 16px 12px;
      border-top: 1px solid var(--border);
    }
    .coord-nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 34px; height: 34px;
      font-size: 20px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
      transition: background 0.15s;
      padding: 0;
    }
    .coord-nav-btn:hover:not(:disabled) { background: var(--bg2); }
    .coord-nav-btn:disabled { opacity: 0.25; cursor: default; }
    .coord-nav-indicator {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 44px;
      text-align: center;
    }

    /* エラー */
    .coord-error {
      background: #fdf5f4;
      border: 1px solid rgba(224,62,62,0.2);
      border-radius: var(--r);
      padding: 14px 16px;
      font-size: 13px;
      color: var(--danger);
      line-height: 1.6;
    }
  </style>
</head>
<body class="detail-page">

  <div class="coord-header">
    <button class="back-btn" onclick="history.back()">← 一覧に戻る</button>
    <div class="logo-sm">COORD</div>
  </div>

  <div class="coord-content">

    <!-- 天気サマリー -->
    <div class="step-label-row">
      <div class="step-label">今日の天気</div>
      <button id="loc-btn" class="loc-btn loc-btn-coord" onclick="openLocSheet()">📍 —</button>
    </div>
    <div class="weather-summary" id="weather-summary">
      <div class="weather-summary-icon">⏳</div>
      <div class="weather-summary-main">
        <div class="weather-summary-temp" id="ws-temp">取得中...</div>
        <div class="weather-summary-desc" id="ws-desc"></div>
      </div>
    </div>

    <!-- 系統選択 -->
    <div class="step-label">ファッションの系統を選ぶ（複数選択可）</div>
    <div class="style-grid" id="style-grid">
      <!-- JS で描画 -->
    </div>

    <!-- 生成ボタン -->
    <button class="generate-btn" id="generate-btn" onclick="generateCoord()" disabled>
      コーデを提案してもらう
    </button>

    <!-- 生成中 -->
    <div class="generating-wrap" id="generating">
      <div class="generating-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="generating-text">コーデを考えています...</div>
    </div>

    <!-- 提案結果 -->
    <div id="coord-results"></div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="weather-loc.js"></script>
  <script src="coord.js"></script>
</body>
</html>
